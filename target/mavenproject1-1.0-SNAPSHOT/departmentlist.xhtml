<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Departments List</ui:define>

    <ui:define name="content">
        <h:form id="deptForm">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
                    <h2 style="margin: 0; font-weight: 600; color: #1e3a8a;">Departments Management</h2>
                    <p:commandButton value="Add Department" 
                                     icon="pi pi-plus" 
                                     type="button" 
                                     onclick="PF('addDeptDialog').show();" 
                                     styleClass="ui-button-primary" />
                </div>

                <p:dataTable id="deptTable" var="d" value="#{departmentBean.departmentList}" 
                              paginator="true" rows="10"
                              paginatorPosition="bottom"
                              styleClass="ui-datatable-striped ui-datatable-gridlines"
                              emptyMessage="No departments found in database">

                    <p:column headerText="Department ID" style="width: 150px; text-align: center;" sortBy="#{d.dept_id}">
                        <h:outputText value="#{d.dept_id}" />
                    </p:column>

                    <p:column headerText="Department Name" sortBy="#{d.dept_name}" filterBy="#{d.dept_name}" filterMatchMode="contains">
                        <h:outputText value="#{d.dept_name}" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <ui:include src="/departmentcreate.xhtml" />

        <h:outputScript target="body" rendered="#{param.openDialog == 'true'}">
            $(document).ready(function() {
                PF('addDeptDialog').show();
            });
        </h:outputScript>
    </ui:define>
</ui:composition>
