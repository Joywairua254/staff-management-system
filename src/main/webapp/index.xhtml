<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Staff Management System - Login</title>
</h:head>
<h:body style="background-color:#f5f5f5; font-family:Arial, sans-serif;">
    <h:form>
        <!-- Logo and Welcome -->
        <div style="display:flex; flex-direction:column; align-items:center; margin-top:50px;">
            <h:graphicImage value="/resources/images/new-mspace-logo.jpeg" width="200" height="150" />
            <h2>Welcome to the Staff Management System</h2>
        </div>

        <!-- Login Panel -->
        <p:panel header="User Login" style="width:350px; margin:auto; margin-top:30px;">
            <h:panelGrid columns="2" cellpadding="5" style="margin:auto;">
                <!-- Username row -->
                <h:outputLabel for="username" value="Username:" />
                <p:inputText id="username" value="#{loginbean.username}" required="true" label="Username" style="width:100%;" />

                <!-- Password row -->
                <h:outputLabel for="password" value="Password:" />
                <p:password id="password" value="#{loginbean.password}" required="true" label="Password" style="width:100%;" />
            </h:panelGrid>

            <!-- Centered Login button -->
            <div style="text-align:center; margin-top:15px;">
                <p:commandButton value="Login"
                                 action="#{loginbean.login}"
                                 update="@form loginMessages"
                                 style="width:100px;" />
            </div>

            <!-- Messages -->
            <p:messages id="loginMessages" showDetail="true" />
        </p:panel>
    </h:form>
</h:body>
</html>
