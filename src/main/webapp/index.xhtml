<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Staff Management System - Login</title>
    <!-- Use Outfit font for modern aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: 'Outfit', 'Inter', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .login-card {
            width: 380px;
            margin: auto;
            border-radius: 12px !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.08) !important;
            border: 1px solid #e5e7eb !important;
            background: white !important;
        }

        .ui-panel .ui-panel-titlebar {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6) !important;
            color: white !important;
            border: none !important;
            padding: 16px 20px !important;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
            font-weight: 600 !important;
            font-size: 16px !important;
            text-align: center;
        }

        .ui-panel .ui-panel-content {
            border: none !important;
            padding: 24px 20px !important;
            border-bottom-left-radius: 12px !important;
            border-bottom-right-radius: 12px !important;
        }

        /* Form styling */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-label {
            width: 90px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
            flex-shrink: 0;
        }

        .form-input-wrapper {
            flex-grow: 1;
        }

        .form-input-wrapper .ui-inputfield {
            width: 100% !important;
            box-sizing: border-box;
            padding: 8px 12px !important;
            border-radius: 6px !important;
            border: 1px solid #d1d5db !important;
            font-size: 14px !important;
            font-family: 'Outfit', sans-serif !important;
            transition: all 0.2s ease !important;
        }

        .form-input-wrapper .ui-inputfield:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
        }

        .form-input-wrapper .ui-password {
            display: inline-block;
            width: 100% !important;
        }

        /* Login Button */
        .login-btn-container {
            margin-top: 24px;
        }

        .login-btn-container .ui-button {
            width: 100% !important;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6) !important;
            border: none !important;
            padding: 8px 0 !important;
            font-size: 15px !important;
            font-weight: 600 !important;
            border-radius: 6px !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2) !important;
            transition: all 0.2s ease !important;
        }

        .login-btn-container .ui-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -1px rgba(59, 130, 246, 0.3) !important;
            opacity: 0.95;
        }

        .messages-container {
            margin-top: 15px;
        }
    </style>
</h:head>
<h:body>
    <h:form id="loginForm">
        <!-- Logo and Welcome -->
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:25px;">
            <h:graphicImage value="/resources/images/new-mspace-logo.jpeg" width="180" height="135" 
                            style="border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); background: white; padding: 4px; object-fit: contain;" />
            <h2 style="color: #1e3a8a; font-weight: 700; margin-top: 15px; text-align: center; font-size: 22px;">
                Welcome to the Staff Management System
            </h2>
        </div>

        <!-- Login Panel -->
        <p:panel header="User Login" styleClass="login-card">
            <!-- Username Row -->
            <div class="form-row">
                <h:outputLabel for="username" value="Username:" styleClass="form-label" />
                <div class="form-input-wrapper">
                    <p:inputText id="username" value="#{loginbean.username}" required="true" label="Username" />
                </div>
            </div>

            <!-- Password Row -->
            <div class="form-row">
                <h:outputLabel for="password" value="Password:" styleClass="form-label" />
                <div class="form-input-wrapper">
                    <p:password id="password" value="#{loginbean.password}" required="true" label="Password" />
                </div>
            </div>

            <!-- Login button -->
            <div class="login-btn-container">
                <p:commandButton value="Login"
                                 action="#{loginbean.login}"
                                 update="@form loginMessages" />
            </div>

            <!-- Messages -->
            <div class="messages-container">
                <p:messages id="loginMessages" showDetail="true" />
            </div>
        </p:panel>
    </h:form>
</h:body>
</html>
