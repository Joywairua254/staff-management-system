<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <p:dialog id="addRoleDialog" header="Add New Role" widgetVar="addRoleDialog" 
              modal="true" showEffect="fade" hideEffect="fade" resizable="false" width="500px"
              responsive="true">
        <h:form id="addRoleForm">
            <p:messages id="roleCreateMsgs" showDetail="true" closable="true" style="margin-bottom: 10px;" />
            <h:panelGrid columns="3" cellpadding="6" style="width: 100%;">
                
                <h:outputLabel for="roleId" value="Role ID:" style="font-weight: bold;" />
                <p:inputText id="roleId" value="#{roleBean.newRole.role_id}" required="true" requiredMessage="Role ID is required" style="width: 100%;" />
                <p:message for="roleId" display="icon" />

                <h:outputLabel for="roleName" value="Role Name:" style="font-weight: bold;" />
                <p:inputText id="roleName" value="#{roleBean.newRole.role_name}" required="true" requiredMessage="Role Name is required" style="width: 100%;" />
                <p:message for="roleName" display="icon" />

            </h:panelGrid>

            <div style="text-align: right; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                <p:commandButton value="Save Role"
                                 action="#{roleBean.saveRole}"
                                 update="addRoleForm :rolesForm"
                                 oncomplete="if (!args.validationFailed) PF('addRoleDialog').hide();"
                                 icon="pi pi-save"
                                 styleClass="ui-button-success"
                                 style="width: 120px; margin-right: 10px;" />

                <p:commandButton value="Cancel"
                                 type="button"
                                 onclick="PF('addRoleDialog').hide();"
                                 icon="pi pi-times"
                                 styleClass="ui-button-secondary"
                                 style="width: 110px;" />
            </div>
        </h:form>
    </p:dialog>
</ui:composition>
