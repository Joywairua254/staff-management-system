<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Roles List</ui:define>

    <ui:define name="content">
        <h:form id="rolesForm">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
                    <h2 style="margin: 0; font-weight: 600; color: #1e3a8a;">Roles Management</h2>
                    <p:commandButton value="Add Role" 
                                     icon="pi pi-plus" 
                                     type="button" 
                                     onclick="PF('addRoleDialog').show();" 
                                     styleClass="ui-button-primary"
                                     rendered="#{loginbean.usertype == 1}" />
                </div>

                <p:dataTable id="rolesTable" var="r" value="#{roleBean.rolesList}" 
                             paginator="true" rows="10"
                             paginatorPosition="bottom"
                             styleClass="ui-datatable-striped ui-datatable-gridlines"
                             emptyMessage="No roles found in database">

                    <p:column headerText="Role ID" style="width: 120px; text-align: center;" sortBy="#{r.role_id}">
                        <h:outputText value="#{r.role_id}" />
                    </p:column>

                    <p:column headerText="Role Name" sortBy="#{r.role_name}" filterBy="#{r.role_name}" filterMatchMode="contains">
                        <h:outputText value="#{r.role_name}" />
                    </p:column>

                    <p:column headerText="Actions" style="width: 130px; text-align: center;" rendered="#{loginbean.usertype == 1}">
                        <p:commandButton icon="pi pi-pencil"
                                         action="#{roleBean.prepareEdit(r)}"
                                         update=":editRoleForm"
                                         oncomplete="PF('editRoleDialog').show();"
                                         styleClass="ui-button-warning ui-button-flat"
                                         style="margin-right: 5px;" />
                        <p:commandButton icon="pi pi-trash"
                                         action="#{roleBean.delete(r)}"
                                         update="rolesForm"
                                         styleClass="ui-button-danger ui-button-flat"
                                         onclick="return confirm('Are you sure you want to delete this role?');" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <ui:include src="/rolecreate.xhtml" />
        <ui:include src="/roleedit.xhtml" />

        <h:outputScript target="body" rendered="#{param.openDialog == 'true' and loginbean.usertype == 1}">
            $(document).ready(function() {
                PF('addRoleDialog').show();
            });
        </h:outputScript>
    </ui:define>
</ui:composition>
