<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Staff List</ui:define>

    <ui:define name="content">
        <h:form id="staffListForm">
            <p:messages id="staffListMsgs" showDetail="true" closable="true" style="margin-bottom: 15px;" />
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
                    <h2 style="margin: 0; font-weight: 600; color: #1e3a8a;">Staff Directory</h2>
                    <p:commandButton value="Add Staff"
                                     icon="pi pi-plus"
                                     type="button"
                                     onclick="PF('addStaffDialog').show();"
                                     styleClass="ui-button-primary" />
                </div>

                <p:dataTable value="#{staffBean.staffList}" var="s"
                             paginator="true" rows="10"
                             style="width:100%"
                             reflow="true"
                             emptyMessage="No staff records found"
                             paginatorPosition="bottom"
                             styleClass="ui-datatable-striped ui-datatable-gridlines">

                    <p:column headerText="ID" style="width: 70px; text-align: center;">
                        <h:outputText value="#{s.id}" />
                    </p:column>

                    <p:column headerText="First Name" sortBy="#{s.firstName}" filterBy="#{s.firstName}" filterMatchMode="contains">
                        <h:outputText value="#{s.firstName}" />
                    </p:column>

                    <p:column headerText="Last Name" sortBy="#{s.lastName}" filterBy="#{s.lastName}" filterMatchMode="contains">
                        <h:outputText value="#{s.lastName}" />
                    </p:column>

                    <p:column headerText="Email">
                        <h:outputText value="#{s.email}" />
                    </p:column>

                    <p:column headerText="Phone">
                        <h:outputText value="#{s.phone}" />
                    </p:column>

                    <p:column headerText="Department ID" style="width: 130px; text-align: center;">
                        <h:outputText value="#{s.deptId}" />
                    </p:column>

                    <p:column headerText="Role ID" style="width: 100px; text-align: center;">
                        <h:outputText value="#{s.roleId}" />
                    </p:column>

                    <p:column headerText="Actions" style="width: 130px; text-align: center;">
                        <p:commandButton icon="pi pi-pencil"
                                         action="#{staffBean.prepareEdit(s)}"
                                         update=":editStaffForm"
                                         oncomplete="PF('editStaffDialog').show();"
                                         styleClass="ui-button-warning ui-button-flat"
                                         style="margin-right: 5px;" />
                        <p:commandButton icon="pi pi-trash"
                                         action="#{staffBean.delete(s)}"
                                         update="staffListForm"
                                         styleClass="ui-button-danger ui-button-flat"
                                         onclick="return confirm('Are you sure you want to delete this staff member?');" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <ui:include src="/staffcreate.xhtml" />
        <ui:include src="/staffedit.xhtml" />

        <h:outputScript target="body" rendered="#{param.openDialog == 'true'}">
            $(document).ready(function() {
                PF('addStaffDialog').show();
            });
        </h:outputScript>
    </ui:define>
</ui:composition>
