<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <p:dialog id="addStaffDialog" header="Add New Staff Member" widgetVar="addStaffDialog" 
              modal="true" showEffect="fade" hideEffect="fade" resizable="false" width="600px"
              responsive="true">
        <h:form id="addStaffForm">
            <p:messages id="staffCreateMsgs" showDetail="true" closable="true" style="margin-bottom: 10px;" />
            <h:panelGrid columns="3" cellpadding="6" style="width: 100%;" columnClasses="form-label-col, form-input-col, form-msg-col">
                
                <h:outputLabel for="firstName" value="First Name:" style="font-weight: bold;" />
                <p:inputText id="firstName" value="#{staffBean.newStaff.firstName}" required="true" requiredMessage="First Name is required" style="width: 100%;" />
                <p:message for="firstName" display="icon" />

                <h:outputLabel for="lastName" value="Last Name:" style="font-weight: bold;" />
                <p:inputText id="lastName" value="#{staffBean.newStaff.lastName}" required="true" requiredMessage="Last Name is required" style="width: 100%;" />
                <p:message for="lastName" display="icon" />

                <h:outputLabel for="email" value="Email:" style="font-weight: bold;" />
                <p:inputText id="email" value="#{staffBean.newStaff.email}" required="true" requiredMessage="Email is required" validatorMessage="Invalid email format" style="width: 100%;">
                    <f:validateRegex pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$" />
                </p:inputText>
                <p:message for="email" display="icon" />

                <h:outputLabel for="phone" value="Phone Number:" style="font-weight: bold;" />
                <p:inputText id="phone" value="#{staffBean.newStaff.phone}" required="true" requiredMessage="Phone is required" style="width: 100%;" />
                <p:message for="phone" display="icon" />

                <h:outputLabel for="deptId" value="Department:" style="font-weight: bold;" />
                <p:selectOneMenu id="deptId" value="#{staffBean.newStaff.deptId}" required="true" requiredMessage="Department is required" style="width: 100%;">
                    <f:selectItem itemLabel="Select Department" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{staffBean.departments}" var="d" itemLabel="#{d.dept_name}" itemValue="#{d.dept_id}" />
                </p:selectOneMenu>
                <p:message for="deptId" display="icon" />

                <h:outputLabel for="roleId" value="Role:" style="font-weight: bold;" />
                <p:selectOneMenu id="roleId" value="#{staffBean.newStaff.roleId}" required="true" requiredMessage="Role is required" style="width: 100%;">
                    <f:selectItem itemLabel="Select Role" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{staffBean.roles}" var="r" itemLabel="#{r.role_name}" itemValue="#{r.role_id}" />
                </p:selectOneMenu>
                <p:message for="roleId" display="icon" />

            </h:panelGrid>

            <p:separator style="margin: 15px 0;" />

            <!-- User Account Option Wrapper -->
            <h:panelGroup id="accountFieldsWrapper" layout="block">
                <h:panelGrid columns="3" cellpadding="6" style="width: 100%;" columnClasses="form-label-col, form-input-col, form-msg-col">
                    <h:outputLabel for="createAccount" value="Create User Account:" style="font-weight: bold;" />
                    <p:selectBooleanCheckbox id="createAccount" value="#{staffBean.createAccount}">
                        <p:ajax update="accountFieldsWrapper" />
                    </p:selectBooleanCheckbox>
                    <h:panelGroup />
                    
                    <h:outputLabel for="username" value="Username:" style="font-weight: bold;" rendered="#{staffBean.createAccount}" />
                    <p:inputText id="username" value="#{staffBean.username}" required="#{staffBean.createAccount}" requiredMessage="Username is required" style="width: 100%;" rendered="#{staffBean.createAccount}" />
                    <p:message for="username" display="icon" rendered="#{staffBean.createAccount}" />

                    <h:outputLabel for="password" value="Password:" style="font-weight: bold;" rendered="#{staffBean.createAccount}" />
                    <p:password id="password" value="#{staffBean.password}" required="#{staffBean.createAccount}" requiredMessage="Password is required" style="width: 100%;" rendered="#{staffBean.createAccount}" />
                    <p:message for="password" display="icon" rendered="#{staffBean.createAccount}" />

                    <h:outputLabel for="usertype" value="Account Type:" style="font-weight: bold;" rendered="#{staffBean.createAccount}" />
                    <p:selectOneMenu id="usertype" value="#{staffBean.usertype}" required="#{staffBean.createAccount}" style="width: 100%;" rendered="#{staffBean.createAccount}">
                        <f:selectItem itemLabel="Normal Staff" itemValue="0" />
                        <f:selectItem itemLabel="Admin" itemValue="1" />
                    </p:selectOneMenu>
                    <p:message for="usertype" display="icon" rendered="#{staffBean.createAccount}" />
                </h:panelGrid>
            </h:panelGroup>

            <div style="text-align: right; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                <p:commandButton value="Save Staff"
                                 action="#{staffBean.saveStaff}"
                                 update="addStaffForm :staffListForm"
                                 oncomplete="if (!args.validationFailed) PF('addStaffDialog').hide();"
                                 icon="pi pi-save"
                                 styleClass="ui-button-success"
                                 style="width: 130px; margin-right: 10px;" />

                <p:commandButton value="Cancel"
                                 type="button"
                                 onclick="PF('addStaffDialog').hide();"
                                 icon="pi pi-times"
                                 styleClass="ui-button-secondary"
                                 style="width: 110px;" />
            </div>
        </h:form>
    </p:dialog>
</ui:composition>
