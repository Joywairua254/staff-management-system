<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">User Accounts</ui:define>

    <ui:define name="content">
        <h:form id="usersForm">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
                    <h2 style="margin: 0; font-weight: 600; color: #1e3a8a;">User Accounts Management</h2>
                    <p:commandButton value="Add User Account" 
                                     icon="pi pi-user-plus" 
                                     update=":createUserForm"
                                     oncomplete="PF('addUserDialog').show();" 
                                     styleClass="ui-button-primary"
                                     rendered="#{loginbean.usertype == 1}" />
                </div>

                <p:dataTable id="usersTable" var="u" value="#{userAccountBean.userList}" 
                             paginator="true" rows="10"
                             paginatorPosition="bottom"
                             styleClass="ui-datatable-striped ui-datatable-gridlines"
                             emptyMessage="No user accounts found in database">

                    <p:column headerText="User ID" style="width: 100px; text-align: center;" sortBy="#{u.user_id}">
                        <h:outputText value="#{u.user_id}" />
                    </p:column>

                    <p:column headerText="Username" sortBy="#{u.username}" filterBy="#{u.username}" filterMatchMode="contains">
                        <h:outputText value="#{u.username}" />
                    </p:column>

                    <p:column headerText="Staff Name" sortBy="#{userAccountBean.getStaffName(u.staffId)}" filterBy="#{userAccountBean.getStaffName(u.staffId)}" filterMatchMode="contains">
                        <h:outputText value="#{userAccountBean.getStaffName(u.staffId)}" />
                    </p:column>

                    <p:column headerText="User Type" sortBy="#{u.usertype}">
                        <span class="#{u.usertype == 1 ? 'ui-tag-danger' : 'ui-tag-info'}">
                            #{u.usertype == 1 ? 'Admin' : 'Normal Staff'}
                        </span>
                    </p:column>

                    <p:column headerText="Actions" style="width: 100px; text-align: center;" rendered="#{loginbean.usertype == 1}">
                        <p:commandButton icon="pi pi-trash"
                                         action="#{userAccountBean.delete(u)}"
                                         update="usersForm"
                                         styleClass="ui-button-danger ui-button-flat"
                                         onclick="return confirm('Are you sure you want to delete this user account?');" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <ui:include src="/usercreate.xhtml" />

        <h:outputScript target="body" rendered="#{param.openDialog == 'true' and loginbean.usertype == 1}">
            $(document).ready(function() {
                PF('addUserDialog').show();
            });
        </h:outputScript>
    </ui:define>
</ui:composition>
