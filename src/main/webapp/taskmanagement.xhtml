<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Task Management</ui:define>

    <ui:define name="content">
        <h2 style="margin-top: 0; font-weight: 600; color: #1e3a8a;">Task Assignment &amp; Tracking</h2>

        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px;">
            <!-- Assign Task Form -->
            <div class="card" style="flex: 1; min-width: 350px;">
                <h3 style="margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #eff6ff; padding-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                    <i class="pi pi-plus-circle" style="font-size: 20px; color: #3b82f6;"></i> Assign New Task
                </h3>
                
                <h:form id="assignTaskForm">
                    <div class="ui-fluid">
                        <div style="margin-bottom: 15px;">
                            <p:outputLabel for="taskDesc" value="Task Description" style="font-weight: 600; margin-bottom: 5px; display: block;" />
                            <p:inputTextarea id="taskDesc" value="#{taskBean.newTask.description}" required="true" requiredMessage="Description is required" rows="3" placeholder="Describe the task details..." autoResize="false" />
                            <p:message for="taskDesc" />
                        </div>

                        <div style="margin-bottom: 15px;">
                            <p:outputLabel for="taskDeadline" value="Task Deadline" style="font-weight: 600; margin-bottom: 5px; display: block;" />
                            <p:datePicker id="taskDeadline" value="#{taskBean.newTask.deadline}" showTime="true" hourFormat="24" required="true" requiredMessage="Deadline is required" pattern="yyyy-MM-dd HH:mm" />
                            <p:message for="taskDeadline" />
                        </div>

                        <div style="margin-bottom: 15px;">
                            <p:outputLabel for="assignmentType" value="Assign To" style="font-weight: 600; margin-bottom: 5px; display: block;" />
                            <p:selectOneMenu id="assignmentType" value="#{taskBean.assignmentType}">
                                <f:selectItem itemLabel="All Staff" itemValue="All" />
                                <f:selectItem itemLabel="Individual Staff" itemValue="Individual" />
                                <f:selectItem itemLabel="Chosen Group" itemValue="Group" />
                                <p:ajax update="assignmentFields" />
                            </p:selectOneMenu>
                        </div>

                        <h:panelGroup id="assignmentFields" layout="block">
                            <!-- Individual Staff selection -->
                            <h:panelGroup rendered="#{taskBean.assignmentType == 'Individual'}" layout="block" style="margin-bottom: 15px;">
                                <p:outputLabel for="staffSelect" value="Select Staff Member" style="font-weight: 600; margin-bottom: 5px; display: block;" />
                                <p:selectOneMenu id="staffSelect" value="#{taskBean.selectedStaffId}" required="true" requiredMessage="A staff member must be selected" filter="true" filterMatchMode="contains">
                                    <f:selectItem itemLabel="Choose Staff..." itemValue="" noSelectionOption="true" />
                                    <f:selectItems value="#{taskBean.staffList}" var="s" itemLabel="#{s.firstName} #{s.lastName}" itemValue="#{s.id}" />
                                </p:selectOneMenu>
                                <p:message for="staffSelect" />
                            </h:panelGroup>

                            <!-- Group selection -->
                            <h:panelGroup rendered="#{taskBean.assignmentType == 'Group'}" layout="block" style="margin-bottom: 15px;">
                                <p:outputLabel for="groupSelect" value="Select Staff Members" style="font-weight: 600; margin-bottom: 5px; display: block;" />
                                <p:selectManyMenu id="groupSelect" value="#{taskBean.selectedStaffIds}" required="true" requiredMessage="Select at least one staff member" showCheckbox="true" filter="true" filterMatchMode="contains" style="width: 100%; height: 160px;">
                                    <f:selectItems value="#{taskBean.staffList}" var="s" itemLabel="#{s.firstName} #{s.lastName}" itemValue="#{s.id}" />
                                </p:selectManyMenu>
                                <p:message for="groupSelect" />
                            </h:panelGroup>
                        </h:panelGroup>

                        <div style="text-align: right; margin-top: 20px;">
                            <p:commandButton value="Assign Task" 
                                             action="#{taskBean.saveTask}" 
                                             update="@form :tasksListForm" 
                                             icon="pi pi-send" 
                                             styleClass="ui-button-primary" />
                        </div>
                    </div>
                </h:form>
            </div>

            <!-- Tasks List Table -->
            <div class="card" style="flex: 2; min-width: 450px;">
                <h3 style="margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #eff6ff; padding-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                    <i class="pi pi-list" style="font-size: 20px; color: #3b82f6;"></i> Assigned Tasks Tracking
                </h3>
                
                <h:form id="tasksListForm">
                    <p:dataTable value="#{taskBean.allTasks}" var="task" 
                                 paginator="true" rows="8" paginatorPosition="bottom"
                                 reflow="true" styleClass="ui-datatable-striped ui-datatable-gridlines"
                                 emptyMessage="No tasks have been assigned yet.">
                        
                        <p:column headerText="Description" style="width: 25%;">
                            <h:outputText value="#{task.description}" style="font-weight: 500;" />
                        </p:column>
                        
                        <p:column headerText="Assigned To" style="width: 20%;">
                            <h:outputText value="#{taskBean.getAssignedStaffNames(task.taskId)}" />
                        </p:column>

                        <p:column headerText="Deadline" sortBy="#{task.deadline}" style="width: 15%; text-align: center;">
                            <h:outputText value="#{task.deadline}">
                                <f:convertDateTime type="localDateTime" pattern="yyyy-MM-dd HH:mm" />
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Submission" style="width: 20%; text-align: center;">
                            <h:panelGroup rendered="#{not empty task.document}">
                                <a href="data:application/octet-stream;base64,#{task.document}" download="#{task.docName}" style="color: #3b82f6; text-decoration: underline; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 4px;" title="Download Submission">
                                    <i class="pi pi-download" style="font-size: 11px;"></i>
                                    <span style="max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">#{task.docName}</span>
                                </a>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{empty task.document}">
                                <span style="color: #9ca3af; font-style: italic; font-size: 11px;">No submission</span>
                            </h:panelGroup>
                        </p:column>

                        <p:column headerText="Status" style="width: 10%; text-align: center;">
                            <h:panelGroup rendered="#{task.completed}">
                                <span class="ui-tag-info"><i class="pi pi-check" style="font-size: 9px; margin-right: 2px;"></i>Completed</span>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{not task.completed and not taskBean.isDeadlineReached(task)}">
                                <span class="ui-tag-warning" style="background-color: #fffbeb; color: #d97706; padding: 4px 6px; border-radius: 4px; font-weight: 600; font-size: 11px; border: 1px solid #fde68a;">Pending</span>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{not task.completed and taskBean.isDeadlineReached(task)}">
                                <span class="ui-tag-danger"><i class="pi pi-clock" style="font-size: 9px; margin-right: 2px;"></i>Expired</span>
                            </h:panelGroup>
                        </p:column>

                        <p:column headerText="Actions" style="width: 10%; text-align: center;">
                            <div style="display: flex; justify-content: center; gap: 5px;">
                                <p:commandButton icon="#{task.completed ? 'pi pi-undo' : 'pi pi-check'}" 
                                                 title="#{task.completed ? 'Mark Pending' : 'Mark Completed'}"
                                                 action="#{taskBean.toggleTaskCompletion(task.taskId, task.completed)}" 
                                                 update="@form" 
                                                 styleClass="#{task.completed ? 'ui-button-warning ui-button-flat' : 'ui-button-success ui-button-flat'}" />
                                <p:commandButton icon="pi pi-trash" 
                                                 title="Delete Task"
                                                 action="#{taskBean.deleteTask(task.taskId)}" 
                                                 update="@form" 
                                                 styleClass="ui-button-danger ui-button-flat" 
                                                 onclick="return confirm('Are you sure you want to delete this task?');" />
                            </div>
                        </p:column>
                    </p:dataTable>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
