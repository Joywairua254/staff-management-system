<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <p:dialog id="markAttendanceDialog" header="Mark Attendance" widgetVar="markAttendanceDialog" 
              modal="true" showEffect="fade" hideEffect="fade" resizable="false" width="550px"
              responsive="true">
        <h:form id="markAttendanceForm">
            <h:panelGrid columns="3" cellpadding="6" style="width: 100%;">
                
                <h:outputLabel for="staffId" value="Staff Member:" style="font-weight: bold;" />
                <p:selectOneMenu id="staffId" value="#{attendanceBean.newAttendance.staff_id}" required="true" requiredMessage="Staff Member is required" style="width: 100%;">
                    <f:selectItem itemLabel="Select Staff Member" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{attendanceBean.staffList}" var="s" itemLabel="#{s.firstName} #{s.lastName}" itemValue="#{s.id}" />
                </p:selectOneMenu>
                <p:message for="staffId" display="icon" />

                <h:outputLabel for="attDate" value="Attendance Date:" style="font-weight: bold;" />
                <p:datePicker id="attDate" value="#{attendanceBean.newAttendance.attendance_date}" required="true" requiredMessage="Attendance Date is required" style="width: 100%;" showIcon="true" />
                <p:message for="attDate" display="icon" />

                <h:outputLabel for="checkIn" value="Check-In Time:" style="font-weight: bold;" />
                <p:datePicker id="checkIn" value="#{attendanceBean.checkInTime}" timeOnly="true" pattern="HH:mm:ss" required="true" requiredMessage="Check-in time is required" style="width: 100%;" showIcon="true" />
                <p:message for="checkIn" display="icon" />

                <h:outputLabel for="checkOut" value="Check-Out Time:" style="font-weight: bold;" />
                <p:datePicker id="checkOut" value="#{attendanceBean.checkOutTime}" timeOnly="true" pattern="HH:mm:ss" required="true" requiredMessage="Check-out time is required" style="width: 100%;" showIcon="true" />
                <p:message for="checkOut" display="icon" />

            </h:panelGrid>

            <div style="text-align: right; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                <p:commandButton value="Mark Attendance"
                                 action="#{attendanceBean.saveAttendance}"
                                 update="markAttendanceForm :attendanceForm"
                                 oncomplete="if (!args.validationFailed) PF('markAttendanceDialog').hide();"
                                 icon="pi pi-check"
                                 styleClass="ui-button-success"
                                 style="width: 170px; margin-right: 10px;" />

                <p:commandButton value="Cancel"
                                 type="button"
                                 onclick="PF('markAttendanceDialog').hide();"
                                 icon="pi pi-times"
                                 styleClass="ui-button-secondary"
                                 style="width: 110px;" />
            </div>
        </h:form>
    </p:dialog>
</ui:composition>
